name: geointel_mobile
description: GeoIntel Intelligence Core — Mobile App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.0
  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Charts
  fl_chart: ^0.69.0
  # HTTP
  dio: ^5.7.0
  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.4.1
  path: ^1.9.0
  # Location
  geolocator: ^13.0.2
  # UI
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2780.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/
